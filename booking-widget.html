<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Discovery Call | TimeBroker.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="config.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
        const app = initializeApp({
            apiKey: "AIzaSyBgCn1OPJqbQM3K3nR0VzX8kL_QuA2GBCQ",
            authDomain: "ac-godmode-titan.firebaseapp.com",
            projectId: "ac-godmode-titan",
            storageBucket: "ac-godmode-titan.firebasestorage.app",
            messagingSenderId: "844071898498",
            appId: "1:844071898498:web:delray-services"
        });
        const db = getFirestore(app);
        window._firebase = { db, collection, addDoc, serverTimestamp };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        .booking-card {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        .time-slot {
            transition: all 0.3s;
        }

        .time-slot:hover {
            transform: scale(1.05);
        }

        .time-slot.selected {
            background: #d4af37 !important;
            color: #0f172a !important;
        }

        .day-btn.selected {
            background: #d4af37 !important;
            color: #0f172a !important;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="booking-card rounded-3xl shadow-2xl max-w-md w-full overflow-hidden">
        <!-- Header -->
        <div class="p-8 text-center border-b border-white/10">
            <div class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase mb-2">Free Strategy Session</div>
            <h1 class="text-3xl font-display font-bold text-white">
                Book With <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-[#d4af37] to-white">Delray</span>
            </h1>
            <p class="text-gray-400 text-sm mt-3">30-minute complimentary consultation</p>
        </div>

        <!-- Booking Form (Cal.com Time Broker) -->
        <div class="p-8 bg-white h-[700px]">
            <!-- Cal.com inline widget begin -->
            <iframe
                src="https://cal.com/timebroker?embed=true"
                style="width: 100%; height: 100%; border: none;"
                title="Time Broker Strategy Session"
            ></iframe>
            <!-- Cal.com inline widget end -->
        </div>

        <!-- Footer -->
        <div class="p-6 bg-black/20 text-center">
            <p class="text-xs text-gray-500">
                <i class="fas fa-shield-alt mr-1"></i> Your information is secure & confidential
            </p>
        </div>
    </div>

</body>

</html>
